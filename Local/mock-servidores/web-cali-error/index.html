<!DOCTYPE html>
<html>
<head>
    <title>503 Service Unavailable</title>
    <style>
        body { font-family: Arial; background: #2c3e50; color: #e74c3c; padding: 50px; text-align: center; }
        .card { background: #34495e; padding: 40px; border-radius: 10px; max-width: 600px; margin: 0 auto; border: 3px solid #e74c3c; }
        .status { color: #e74c3c; font-size: 48px; }
        h1 { color: #ecf0f1; }
    </style>
</head>
<body>
    <div class="card">
        <div class="status">⚠️</div>
        <h1>503 Service Unavailable</h1>
        <h2>CALI LIMONAR PRINCIPAL</h2>
        <p><strong>NodeID:</strong> 597</p>
        <p><strong>IP:</strong> 172.30.0.21 (Mock: 10.0.30.4)</p>
        <p><strong>Machine Type:</strong> Cisco C1111</p>
        <p><strong>Status:</strong> <span style="color: #e74c3c;">DOWN</span></p>
        <hr style="border-color: #e74c3c; margin: 30px 0;">
        <p>El servidor no está disponible. Hardware health monitoring is in Unknown state.</p>
        <p style="font-size: 12px; opacity: 0.7; margin-top: 20px;">
            Servidor simulado para pruebas de monitoreo - Estado: DOWN
        </p>
    </div>
</body>
</html>
